version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging into Amazon ECR...
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 391505362986.dkr.ecr.ap-south-1.amazonaws.com

  build:
    commands:
      - echo Build started
      - docker build -t brain-tasks-app .
      - docker tag brain-tasks-app:latest 391505362986.dkr.ecr.ap-south-1.amazonaws.com/brain-tasks-app:latest

  post_build:
    commands:
      - echo Pushing Docker image...
      - docker push 391505362986.dkr.ecr.ap-south-1.amazonaws.com/brain-tasks-app:latest
      - echo Build completed

artifacts:
  files:
    - '**/*'